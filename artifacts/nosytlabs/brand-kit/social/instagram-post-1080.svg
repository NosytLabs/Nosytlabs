<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Nosytlabs Instagram post template">
  <title>Instagram square post template — 1080x1080</title>
  <defs>
    <radialGradient id="bg" cx="60%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#15151a"/>
      <stop offset="55%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d8b87a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ws { font-family: 'Instrument Serif','Times New Roman',serif; font-style: italic; font-weight: 400; }
      .mono { font-family: ui-monospace, 'Geist Mono', monospace; letter-spacing: 0.3em; }
    </style>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>
  <g fill="#f5f1e8">
    <circle cx="160" cy="200" r="1.0" opacity="0.5"/>
    <circle cx="380" cy="120" r="0.7" opacity="0.4"/>
    <circle cx="640" cy="240" r="0.8" opacity="0.45"/>
    <circle cx="880" cy="160" r="0.9" opacity="0.5"/>
    <circle cx="240" cy="880" r="0.6" opacity="0.4"/>
    <circle cx="540" cy="980" r="0.8" opacity="0.5"/>
    <circle cx="820" cy="900" r="0.7" opacity="0.45"/>
    <circle cx="940" cy="780" r="0.5" opacity="0.4"/>
  </g>
  <text x="540" y="180" class="mono" font-size="20" fill="#f5f1e8" fill-opacity="0.6" text-anchor="middle">NOSYTLABS · EST. 2025</text>
  <text x="540" y="490" class="ws" font-size="116" fill="#f5f1e8" text-anchor="middle">Notable</text>
  <text x="540" y="610" class="ws" font-size="116" fill="#f5f1e8" text-anchor="middle">opportunities</text>
  <text x="540" y="730" class="ws" font-size="116" fill="#d8b87a" text-anchor="middle">shape<tspan fill="#f5f1e8"> your</tspan></text>
  <text x="540" y="850" class="ws" font-size="116" fill="#f5f1e8" text-anchor="middle">tomorrow.</text>
  <text x="540" y="980" class="mono" font-size="18" fill="#d8b87a" fill-opacity="0.85" text-anchor="middle">NOSYTLABS.COM</text>
</svg>
