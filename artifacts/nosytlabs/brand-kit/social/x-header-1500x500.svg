    <text x="0" y="190" xml:space="preserve" class="ws" font-size="92" fill="#f5f1e8"><tspan fill="#d8b87a">shape</tspan> your tomorrow.</text>
    <text x="0" y="240" class="mono" font-size="13" fill="#f5f1e8" fill-opacity="0.55">AI AGENTS &#160;&#183;&#160; MCP SERVERS &#160;&#183;&#160; WEB APPS &#160;&#183;&#160; NOSYTLABS.COM</text>
