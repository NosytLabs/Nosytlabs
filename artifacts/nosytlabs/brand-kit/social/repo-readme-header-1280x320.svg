<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Nosytlabs repo README header">
  <title>Repo README header banner — 1280x320</title>
  <defs>
    <radialGradient id="bg" cx="65%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#15151a"/>
      <stop offset="55%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#d8b87a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tile" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="55%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="100%" stop-color="#d8d2c2"/>
    </linearGradient>
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c878" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ws { font-family: 'Instrument Serif','Times New Roman',Georgia,serif; font-style: italic; font-weight: 400; }
      .mono { font-family: ui-monospace,'Geist Mono',monospace; letter-spacing: 0.28em; }
    </style>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>
  <g fill="#f5f1e8">
    <circle cx="160" cy="60" r="0.8" opacity="0.5"/>
    <circle cx="380" cy="200" r="1.0" opacity="0.4"/>
    <circle cx="640" cy="80" r="0.6" opacity="0.5"/>
    <circle cx="900" cy="240" r="0.9" opacity="0.5"/>
    <circle cx="1100" cy="120" r="0.7" opacity="0.4"/>
  </g>
  <g transform="translate(80,100)">
    <rect width="120" height="120" rx="26" fill="url(#tile)"/>
    <rect x="1.5" y="1.5" width="117" height="117" rx="24.5" fill="none" stroke="#f5f1e8" stroke-opacity="0.22"/>
    <text x="32" y="94" class="ws" font-size="96" fill="url(#ng)">n</text>
    <circle cx="92" cy="90" r="13" fill="url(#dotglow)"/>
    <circle cx="92" cy="90" r="6" fill="#d8b87a"/>
  </g>
  <g transform="translate(240,128)">
    <text x="0" y="0" class="mono" font-size="13" fill="#f5f1e8" fill-opacity="0.6">NOSYTLABS &#160;&#183;&#160; OPEN SOURCE</text>
    <text x="0" y="58" class="ws" font-size="52" fill="#f5f1e8">Notable opportunities</text>
    <text x="0" y="116" xml:space="preserve" class="ws" font-size="52" fill="#f5f1e8"><tspan fill="#d8b87a">shape</tspan> your tomorrow.</text>
  </g>
</svg>
