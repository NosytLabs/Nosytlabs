<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Nosytlabs profile avatar">
  <title>Profile avatar — 1024x1024 (GitHub / X / LinkedIn / Bluesky)</title>
  <defs>
    <radialGradient id="tile" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="55%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="100%" stop-color="#d8d2c2"/>
    </linearGradient>
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c878" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .n { font-family: 'Instrument Serif','Times New Roman',Georgia,serif; font-style: italic; font-weight: 400; }
    </style>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#tile)"/>
  <rect x="12" y="12" width="1000" height="1000" rx="212" fill="none" stroke="#f5f1e8" stroke-opacity="0.22" stroke-width="6"/>
  <text x="436" y="740" class="n" font-size="720" fill="url(#ng)">n</text>
  <circle cx="780" cy="708" r="118" fill="url(#dotglow)"/>
  <circle cx="780" cy="708" r="52" fill="#d8b87a"/>
</svg>
