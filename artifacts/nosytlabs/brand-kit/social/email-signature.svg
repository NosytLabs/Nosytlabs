<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120" role="img" aria-label="Nosytlabs email signature">
  <title>Email signature lockup — 640x120 (renders on light email backgrounds)</title>
  <defs>
    <radialGradient id="tile" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="55%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="100%" stop-color="#d8d2c2"/>
    </linearGradient>
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c878" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ws{font-family:'Instrument Serif','Times New Roman',Georgia,serif;font-style:italic;font-weight:400}
      .body{font-family:-apple-system,BlinkMacSystemFont,'Geist',system-ui,sans-serif}
      .mono{font-family:ui-monospace,'Geist Mono',monospace;letter-spacing:0.14em}
    </style>
  </defs>
  <g transform="translate(0,16)">
    <rect width="88" height="88" rx="20" fill="url(#tile)"/>
    <rect x="1.5" y="1.5" width="85" height="85" rx="18.5" fill="none" stroke="#f5f1e8" stroke-opacity="0.22"/>
    <text x="26" y="68" class="ws" font-size="68" fill="url(#ng)">n</text>
    <circle cx="60" cy="64" r="10" fill="url(#dotglow)"/>
    <circle cx="60" cy="64" r="4.5" fill="#d8b87a"/>
  </g>
  <g transform="translate(112,28)">
    <text x="0" y="0" class="ws" font-size="36" fill="#0a0a0b">Nosytlabs</text>
    <circle cx="178" cy="-3" r="4" fill="#d8b87a"/>
    <text x="0" y="32" class="body" font-size="13" fill="#0a0a0b" fill-opacity="0.7">Independent US studio &#183; AI agents, MCP servers, small fast web apps</text>
    <text x="0" y="58" class="mono" font-size="10" fill="#0a0a0b" fill-opacity="0.6">NOSYTLABS.COM &#160;&#183;&#160; HI@NOSYTLABS.COM &#160;&#183;&#160; GITHUB.COM/NOSYTLABS</text>
  </g>
