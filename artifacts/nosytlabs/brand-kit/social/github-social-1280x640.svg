<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Nosytlabs GitHub social preview">
  <title>GitHub social preview / repo OG card — 1280x640</title>
  <defs>
    <radialGradient id="bg" cx="65%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#15151a"/>
      <stop offset="55%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="80%" cy="55%" r="42%">
      <stop offset="0%" stop-color="#d8b87a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tile" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="55%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="100%" stop-color="#d8d2c2"/>
    </linearGradient>
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c878" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ws { font-family: 'Instrument Serif','Times New Roman',Georgia,serif; font-style: italic; font-weight: 400; }
      .mono { font-family: ui-monospace,'Geist Mono',monospace; letter-spacing: 0.28em; }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <g fill="#f5f1e8">
    <circle cx="120" cy="120" r="0.8" opacity="0.5"/>
    <circle cx="320" cy="240" r="1.0" opacity="0.4"/>
    <circle cx="500" cy="80" r="0.6" opacity="0.5"/>
    <circle cx="720" cy="500" r="0.9" opacity="0.5"/>
    <circle cx="980" cy="180" r="0.7" opacity="0.4"/>
    <circle cx="1180" cy="440" r="0.8" opacity="0.45"/>
  </g>
  <g transform="translate(80,200)">
    <rect width="200" height="200" rx="44" fill="url(#tile)"/>
    <rect x="2" y="2" width="196" height="196" rx="42" fill="none" stroke="#f5f1e8" stroke-opacity="0.22" stroke-width="1.5"/>
    <text x="54" y="158" class="ws" font-size="160" fill="url(#ng)">n</text>
    <circle cx="156" cy="150" r="22" fill="url(#dotglow)"/>
    <circle cx="156" cy="150" r="10" fill="#d8b87a"/>
  </g>
  <g transform="translate(330,228)">
    <text x="0" y="0" class="mono" font-size="14" fill="#f5f1e8" fill-opacity="0.6">NOSYTLABS &#160;&#183;&#160; OPEN SOURCE BY DEFAULT</text>
    <text x="0" y="86" class="ws" font-size="76" fill="#f5f1e8">AI agents, MCP servers,</text>
    <text x="0" y="166" class="ws" font-size="76" fill="#f5f1e8">small fast web apps.</text>
    <text x="0" y="220" class="mono" font-size="12" fill="#d8b87a" fill-opacity="0.85">GITHUB.COM/NOSYTLABS &#160;&#183;&#160; NOSYTLABS.COM</text>
  </g>
</svg>
