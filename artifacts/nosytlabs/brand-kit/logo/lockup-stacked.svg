<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" role="img" aria-label="Nosytlabs">
  <title>Nosytlabs stacked lockup — mark above wordmark</title>
  <defs>
    <radialGradient id="tile" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="55%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="100%" stop-color="#d8d2c2"/>
    </linearGradient>
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c878" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .n { font-family: 'Instrument Serif','Times New Roman',serif; font-style: italic; font-weight: 400; }
    </style>
  </defs>
  <g transform="translate(96,0)">
    <rect width="128" height="128" rx="28" fill="url(#tile)"/>
    <rect x="1.5" y="1.5" width="125" height="125" rx="26.5" fill="none" stroke="#f5f1e8" stroke-opacity="0.22"/>
    <text x="64" y="98" class="n" font-size="100" fill="url(#ng)" text-anchor="middle">n</text>
    <circle cx="93" cy="92" r="14" fill="url(#dotglow)"/>
    <circle cx="93" cy="92" r="6" fill="#d8b87a"/>
  </g>
  <text x="160" y="240" class="n" font-size="76" fill="#f5f1e8" text-anchor="middle" letter-spacing="-1">Nosytlabs<tspan fill="#d8b87a">.</tspan></text>
  <text x="160" y="304" font-family="ui-monospace,'Geist Mono',monospace" font-size="14" fill="#f5f1e8" fill-opacity="0.55" text-anchor="middle" letter-spacing="6">INDEPENDENT STUDIO</text>
</svg>
