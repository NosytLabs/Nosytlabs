<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" role="img" aria-label="Nosytlabs watermark">
  <title>Nosytlabs corner watermark — overlay on photos and screenshots</title>
  <defs>
    <radialGradient id="tile" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="55%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="100%" stop-color="#d8d2c2"/>
    </linearGradient>
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c878" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d8b87a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ws { font-family: 'Instrument Serif','Times New Roman',Georgia,serif; font-style: italic; font-weight: 400; }
    </style>
  </defs>
  <g opacity="0.92">
    <rect x="0" y="6" width="60" height="60" rx="13" fill="url(#tile)"/>
    <rect x="1" y="7" width="58" height="58" rx="12" fill="none" stroke="#f5f1e8" stroke-opacity="0.22"/>
    <text x="14" y="50" class="ws" font-size="46" fill="url(#ng)">n</text>
    <circle cx="46" cy="46" r="9" fill="url(#dotglow)"/>
    <circle cx="46" cy="46" r="4" fill="#d8b87a"/>
    <text x="76" y="46" class="ws" font-size="34" fill="#f5f1e8" letter-spacing="-0.5">nosytlabs<tspan fill="#d8b87a">.</tspan></text>
  </g>
</svg>
