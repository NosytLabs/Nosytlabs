<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" role="img" aria-label="Nosytlabs watermark">
  <title>Nosytlabs corner watermark — overlay on photos and screenshots at 60% opacity</title>
  <defs>
    <linearGradient id="ng" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="100%" stop-color="#d8d2c2"/>
    </linearGradient>
    <style>
      .n { font-family: 'Instrument Serif','Times New Roman',serif; font-style: italic; font-weight: 400; }
    </style>
  </defs>
  <g opacity="0.6">
    <rect x="0" y="6" width="48" height="48" rx="10" fill="#0a0a0b"/>
    <text x="24" y="44" class="n" font-size="38" fill="url(#ng)" text-anchor="middle">n</text>
    <circle cx="35" cy="40" r="3" fill="#d8b87a"/>
    <text x="60" y="42" class="n" font-size="32" fill="#f5f1e8" letter-spacing="-0.3">nosytlabs<tspan fill="#d8b87a">.</tspan></text>
  </g>
</svg>
